name: CI
on:
  push:
  pull_request:
jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: {distribution: temurin, java-version: '17'}
      - uses: nf-core/setup-nextflow@v2
        with: {version: '26.04.4'}
      - run: nextflow config .
  r-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
      - run: Rscript -e "install.packages('testthat', repos='https://cloud.r-project.org'); testthat::test_dir('tests/r')"
  container-smoke:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/build-push-action@v6
        with: {context: ., push: false, tags: ghcr.io/daleannear/opensesame:ci}
      - run: docker run --rm ghcr.io/daleannear/opensesame:ci Rscript -e "stopifnot(requireNamespace('sesame',quietly=TRUE))"
